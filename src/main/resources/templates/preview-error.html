<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Preview error</title><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#7f1d1d;font-family:Inter,Arial,sans-serif;color:#fff;padding:24px}.error-box{max-width:760px;width:100%;background:#b91c1c;border:2px solid rgba(255,255,255,.28);border-radius:20px;padding:36px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35)}.icon{font-size:56px;line-height:1;margin-bottom:14px}.title{font-size:28px;font-weight:800;margin:0 0 10px}.subtitle{font-size:16px;opacity:.95;margin:0 0 14px}.meta{font-size:14px;opacity:.88;margin:6px 0}.help{margin-top:18px;font-size:15px;font-weight:700}</style></head><body><div class="error-box"><div class="icon">⚠️</div><h1 class="title">Error while parsing the document</h1><p class="subtitle">The document could not be rendered or extracted for preview.</p><p class="meta">File: <span th:text="${title}"></span></p><p class="meta">Type: <span th:text="${fileType}"></span></p><p class="meta">Status: parsing/rendering failed</p><p class="help">Please contact Fakher Hammami.</p></div></body></html>
