<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${title}">Document</title><link rel="stylesheet" href="/preview-presentation.css"></head><body><div class="page"><h1 th:text="${title}"></h1><div class="meta">PowerPoint preview</div><section class="slide" th:each="slide : ${data.slides}"><div class="meta">Slide <span th:text="${slide.index}"></span></div><h2 th:text="${#strings.isEmpty(slide.title)} ? 'Untitled slide' : ${slide.title}"></h2><img class="thumb" alt="slide thumbnail" th:if="${slide.thumbnailBase64}" th:src="|data:image/png;base64,${slide.thumbnailBase64}|"><p th:each="text : ${slide.texts}" th:text="${text}"></p><p th:each="link : ${slide.links}"><a th:href="${link.url}" target="_blank" rel="noopener noreferrer" th:text="${#strings.isEmpty(link.label)} ? ${link.url} : ${link.label}"></a></p><img class="slide-img" alt="Slide embedded image" th:each="image : ${slide.images}" th:src="|data:image/${image.format};base64,${image.base64Data}|"></section></div></body></html>
