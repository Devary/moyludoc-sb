<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${title}">Document</title><link rel="stylesheet" href="/preview-pdf.css"></head><body><div class="page"><h1 th:text="${title}"></h1><div class="meta">PDF preview • <span th:text="${data.pageCount}"></span> pages</div><th:block th:each="image : ${data.pageImages}"><div class="meta">Page <span th:text="${image.pageNumber}"></span></div><img class="page-thumb" alt="PDF page" th:src="|data:image/png;base64,${image.base64Png}|"></th:block></div></body></html>
