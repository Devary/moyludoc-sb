<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${title}">Document</title><link rel="stylesheet" href="/preview-spreadsheet.css"></head><body><div class="page"><h1 th:text="${title}"></h1><div class="meta">Excel preview</div><div class="sheet" th:each="sheet : ${data.sheets}"><h2 th:text="${sheet.name}"></h2><table><tr th:each="row : ${sheet.rows}"><td th:each="cell : ${row}" th:attr="style=${cell.css}"><a th:if="${cell.hyperlink}" th:href="${cell.hyperlink}" target="_blank" rel="noopener noreferrer" th:text="${cell.value}"></a><th:block th:unless="${cell.hyperlink}" th:text="${cell.value}"></th:block></td></tr></table><img class="sheet-img" alt="Excel image" th:each="image : ${sheet.images}" th:src="|data:image/${image.format};base64,${image.base64Data}|"></div></div></body></html>
